<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wise Yurtdışı Eğitim - Program Arama Motoru</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { 
            background-color: #f4f6f9; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); }
        .navbar-brand { font-weight: 700; letter-spacing: 0.5px; }
        
        .uni-logo {
            max-width: 50px;
            max-height: 50px;
            object-fit: contain;
            border-radius: 6px;
            background: #fff;
            padding: 2px;
            border: 1px solid #e2e8f0;
        }
        
        .table-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border: none;
        }
        
        .table thead th {
            background-color: #f8fafc;
            color: #475569;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #e2e8f0;
        }

        .dataTables_filter { display: none; }
        
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        #main-content { display: none; }

        .stat-card {
            border-radius: 10px;
            border: none;
        }

        /* 1. Dokunuş: Mobilde uzun metinlerin alt satıra geçmesine izin ver ve hücre boşluklarını azalt */
        .table td { 
            white-space: normal !important; 
            padding: 8px 4px !important; /* Hücre boşluklarını azalttık (compact etkisi) */
        }

        @media (max-width: 768px) {
            .stat-card h2 { font-size: 1.4rem; }
            .stat-card i { font-size: 1.8rem; }
            .table-card { padding: 0.75rem !important; }
            
            /* 2. Dokunuş: Mobilde metin boyutunu küçülterek 3 sütunun sığmasını sağla */
            .table td, .table th { font-size: 0.8rem !important; }
            
            /* Mobilde logo sütununu daralt */
            .uni-logo { max-width: 35px; max-height: 35px; }
            
            /* Responsive "+" ikonunu hücrenin soluna al ve metinden ayır */
            table.dataTable.dtr-inline.collapsed>tbody>tr>td.dtr-control {
                padding-left: 30px !important;
            }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;"></div>
        <h5 class="mt-3 text-secondary fw-bold">Programlar optimize ediliyor...</h5>
    </div>

    <div id="main-content">
        <nav class="navbar navbar-expand-lg navbar-dark mb-4 shadow-sm">
            <div class="container-fluid px-4">
                <a class="navbar-brand" href="#">
                    <i class="fa-solid fa-earth-europe me-2"></i> Wise Yurtdışı Eğitim Paneli
                </a>
            </div>
        </nav>

        <div class="container-fluid px-1 px-md-4 mb-5">
            <div class="row mb-3 g-2">
                <div class="col-6 col-md-6">
                    <div class="card stat-card bg-primary text-white shadow-sm h-100">
                        <div class="card-body d-flex flex-column flex-md-row align-items-center text-center text-md-start p-2 p-md-3">
                            <i class="fa-solid fa-database fa-lg fa-md-3x opacity-50 mb-1 mb-md-0 me-md-4"></i>
                            <div>
                                <h6 class="card-title text-uppercase mb-1 opacity-75" style="font-size: 0.7rem;">Toplam Program</h6>
                                <h2 id="stat-total" class="m-0 fw-bold">0</h2>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-md-6">
                    <div class="card stat-card bg-success text-white shadow-sm h-100">
                        <div class="card-body d-flex flex-column flex-md-row align-items-center text-center text-md-start p-2 p-md-3">
                            <i class="fa-solid fa-list-check fa-lg fa-md-3x opacity-50 mb-1 mb-md-0 me-md-4"></i>
                            <div>
                                <h6 class="card-title text-uppercase mb-1 opacity-75" style="font-size: 0.7rem;">Filtrelenen</h6>
                                <h2 id="stat-filtered" class="m-0 fw-bold">0</h2>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card table-card p-3 p-md-4">
                <h4 class="text-primary fw-bold mb-3 fs-6"><i class="fa-solid fa-magnifying-glass me-2"></i>Almanya Program Arama Motoru</h4>
                
                <div class="bg-light p-2 p-md-3 rounded border mb-3">
                    <div class="row g-2 mb-2">
                        <div class="col-12 col-md-3">
                            <div class="input-group input-group-sm">
                                <span class="input-group-text bg-white border-primary"><i class="fa-solid fa-search text-primary"></i></span>
                                <input type="text" id="custom-search" class="form-control border-primary" placeholder="Bölüm, Üniversite vb. Ara">
                            </div>
                        </div>
                        <div class="col-6 col-md-3">
                            <select id="filter-derece" class="form-select form-select-sm border-info"><option value="">Eğitim Derecesi</option></select>
                        </div>
                        <div class="col-6 col-md-3">
                            <select id="filter-dil" class="form-select form-select-sm border-info"><option value="">Eğitim Dili</option></select>
                        </div>
                        <div class="col-12 col-md-3">
                            <select id="filter-sehir" class="form-select form-select-sm border-info"><option value="">Şehir Seç</option></select>
                        </div>
                    </div>
                    
                    <div class="row g-2 align-items-end">
                        <div class="col-4 col-md-3">
                            <select id="filter-ncfrei" class="form-select form-select-sm border-warning"><option value="">NC Frei?</option></select>
                        </div>
                        <div class="col-4 col-md-3">
                            <select id="filter-sartli" class="form-select form-select-sm border-warning"><option value="">Şartlı Kabul?</option></select>
                        </div>
                        <div class="col-4 col-md-3">
                            <select id="filter-seviye" class="form-select form-select-sm border-warning"><option value="">Dil Seviyesi</option></select>
                        </div>
                        <div class="col-12 col-md-3 mt-2 mt-md-0">
                            <button id="btn-clear" class="btn btn-outline-danger btn-sm w-100 fw-bold py-1">
                                <i class="fa-solid fa-trash-can me-1"></i> Filtreleri Temizle
                            </button>
                        </div>
                    </div>
                </div>
                
                <div class="w-100">
                    <table id="veriTablosu" class="table table-sm table-hover table-striped align-middle dt-responsive compact" style="width:100%">
                        <thead>
                            <tr>
                                <th data-priority="3">Logo</th>
                                <th data-priority="2">Üniversite</th>
                                <th data-priority="1">Program Adı</th>
                                <th>Derece</th>
                                <th>Süre</th>
                                <th>Şehir</th>
                                <th>Dil</th>
                                <th>NC Frei</th>
                                <th data-priority="4">Şartlı Kabul</th>
                            </tr>
                        </thead>
                        <tbody>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/responsive.bootstrap5.min.js"></script>

    <script>
        $(document).ready(function() {
            Papa.parse("data.csv", {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    var veri = results.data;

                    $('#stat-total').text(veri.length.toLocaleString('tr-TR'));

                    var table = $('#veriTablosu').DataTable({
                        data: veri,
                        responsive: {
                            details: {
                                type: 'column', // "+" ikonu için ayrı bir sütun oluşturma, mevcut hücreye ekle (dtr-control)
                                target: 2       // "+" ikonunu 'Program Adı' hücresine koy
                            }
                        },
                        columns: [
                            { 
                                data: 'Image1',
                                render: function(data, type) {
                                    if(type === 'display') {
                                        return data ? `<img src="${data}" alt="Logo" class="uni-logo shadow-sm">` : '<span class="badge bg-light text-dark border p-1" style="font-size:0.6rem;">LOGO</span>';
                                    }
                                    return data;
                                },
                                orderable: false,
                                className: 'text-center'
                            },
                            { data: 'Content2', className: 'fw-bold text-dark' },
                            { data: 'Conten1', className: 'text-primary fw-semibold dtr-control' }, // 2: "+" ikonu buraya gelecek
                            { data: 'itemsgrid_item1' }, // 3: Derece
                            { data: 'itemsgrid_ite2' },  // 4: Süre
                            { data: 'itemsgrid_ite3' },  // 5: Şehir
                            { data: 'Language' },        // 6: Dil
                            { 
                                data: 'NC Frei mı?',      // 7: NC Frei
                                render: function(data, type) {
                                    if (type === 'display') {
                                        if (data === 'Evet') return '<span class="badge bg-success bg-opacity-75 p-1" style="font-size:0.6rem;"><i class="fa-solid fa-check"></i> Evet</span>';
                                        if (data === 'Hayır') return '<span class="badge bg-danger bg-opacity-75 p-1" style="font-size:0.6rem;"><i class="fa-solid fa-xmark"></i> Hayır</span>';
                                        return `<span class="badge bg-secondary bg-opacity-75 p-1" style="font-size:0.6rem;">${data || '-'}</span>`;
                                    }
                                    return data || '';
                                },
                                className: 'text-center'
                            },
                            { 
                                data: 'Şartlı kabul var mı?', // 8: Şartlı Kabul
                                render: function(data, type, row) {
                                    if (type === 'display') {
                                        let html = data === 'Var' ? '<span class="badge bg-success p-1" style="font-size:0.6rem;">Var</span>' : `<span class="badge bg-secondary p-1" style="font-size:0.6rem;">${data || 'Yok'}</span>`;
                                        if (data === 'Var' && row['Hangi Almanca seviyesine şartlı kabul veriyor ?'] && row['Hangi Almanca seviyesine şartlı kabul veriyor ?'] !== '0') {
                                            html += ` <small class="text-muted fw-bold" style="font-size: 0.6rem;">(${row['Hangi Almanca seviyesine şartlı kabul veriyor ?']})</small>`;
                                        }
                                        return html;
                                    }
                                    return data || '';
                                },
                                className: 'text-center'
                            },
                            { 
                                data: 'Hangi Almanca seviyesine şartlı kabul veriyor ?', // 9: Gizli
                                visible: false 
                            }
                        ],
                        language: {
                            url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/tr.json'
                        },
                        deferRender: true,
                        pageLength: 25,
                        order: [[1, 'asc']],
                        
                        initComplete: function () {
                            this.api().column(3).data().unique().sort().each(function (d) { if(d) $('#filter-derece').append('<option value="'+d+'">'+d+'</option>'); });
                            this.api().column(6).data().unique().sort().each(function (d) { if(d) $('#filter-dil').append('<option value="'+d+'">'+d+'</option>'); });
                            this.api().column(5).data().unique().sort().each(function (d) { if(d) $('#filter-sehir').append('<option value="'+d+'">'+d+'</option>'); });
                            this.api().column(7).data().unique().sort().each(function (d) { if(d) $('#filter-ncfrei').append('<option value="'+d+'">'+d+'</option>'); });
                            this.api().column(8).data().unique().sort().each(function (d) { if(d) $('#filter-sartli').append('<option value="'+d+'">'+d+'</option>'); });
                            this.api().column(9).data().unique().sort().each(function (d) { if(d && d.trim() !== '' && d.trim() !== '0') $('#filter-seviye').append('<option value="'+d+'">'+d+'</option>'); });
                        }
                    });

                    table.on('draw', function () {
                        var info = table.page.info();
                        $('#stat-filtered').text(info.recordsDisplay.toLocaleString('tr-TR'));
                    });
                    
                    $('#stat-filtered').text(veri.length.toLocaleString('tr-TR'));

                    $('#custom-search').on('keyup', function() { table.search(this.value).draw(); });
                    $('#filter-derece').on('change', function() { let val = $.fn.dataTable.util.escapeRegex($(this).val()); table.column(3).search(val ? '^'+val+'$' : '', true, false).draw(); });
                    $('#filter-dil').on('change', function() { let val = $.fn.dataTable.util.escapeRegex($(this).val()); table.column(6).search(val ? '^'+val+'$' : '', true, false).draw(); });
                    $('#filter-sehir').on('change', function() { let val = $.fn.dataTable.util.escapeRegex($(this).val()); table.column(5).search(val ? '^'+val+'$' : '', true, false).draw(); });
                    $('#filter-ncfrei').on('change', function() { let val = $.fn.dataTable.util.escapeRegex($(this).val()); table.column(7).search(val ? '^'+val+'$' : '', true, false).draw(); });
                    $('#filter-sartli').on('change', function() { let val = $.fn.dataTable.util.escapeRegex($(this).val()); table.column(8).search(val ? '^'+val+'$' : '', true, false).draw(); });
                    $('#filter-seviye').on('change', function() { let val = $.fn.dataTable.util.escapeRegex($(this).val()); table.column(9).search(val ? '^'+val+'$' : '', true, false).draw(); });

                    $('#btn-clear').on('click', function() {
                        $('#custom-search').val('');
                        $('#filter-derece').val(''); // Varsayılan metne geri dön
                        $('#filter-dil').val('');
                        $('#filter-sehir').val('');
                        $('#filter-ncfrei').val('');
                        $('#filter-sartli').val('');
                        $('#filter-seviye').val('');
                        table.search('').columns().search('').draw();
                    });

                    $('#loader').fadeOut(300, function() {
                        $('#main-content').fadeIn(300);
                    });
                }
            });
        });
    </script>
</body>
</html>
